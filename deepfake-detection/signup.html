<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DeepShield</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <script src="config.js"></script>
    <style>
        /* =======================================
           SIGNUP PAGE - MODERN GLASSMORPHIC DESIGN
           ======================================= */

        body {
            background: linear-gradient(
                135deg,
                #0a0e27 0%,
                #1a1f3a 25%,
                #0f1a40 50%,
                #1a2a50 75%,
                #0a0e27 100%
            );
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            left: -200px;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            z-index: 0;
            animation: float 25s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            position: relative;
            z-index: 1;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 520px;
            animation: slideInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 
                0 20px 60px rgba(0, 102, 255, 0.15),
                0 0 80px rgba(0, 212, 255, 0.05) inset;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(0, 212, 255, 0.4) 50%,
                transparent 100%
            );
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
            animation: slideInDown 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(0, 102, 255, 0.6));
            animation: float 3s ease-in-out infinite;
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            letter-spacing: -1px;
            text-transform: capitalize;
        }

        .auth-header p {
            color: rgba(224, 224, 224, 0.6);
            margin-top: 12px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 18px;
            animation: slideInLeft 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }
        .form-group:nth-child(3) { animation-delay: 0.4s; }
        .form-group:nth-child(4) { animation-delay: 0.5s; }
        .form-group:nth-child(5) { animation-delay: 0.6s; }
        .form-group:nth-child(6) { animation-delay: 0.7s; }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group label {
            display: block;
            color: rgba(224, 224, 224, 0.9);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(0, 212, 255, 0.1);
            color: rgba(224, 224, 224, 0.95);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .form-group input::placeholder {
            color: rgba(224, 224, 224, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.6);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 0 0 4px rgba(0, 212, 255, 0.1),
                0 0 20px rgba(0, 212, 255, 0.2) inset;
            transform: translateY(-2px);
        }

        .submit-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #0066ff 0%, #00d4ff 100%);
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 12px 32px rgba(0, 102, 255, 0.35),
                0 0 20px rgba(0, 212, 255, 0.1) inset;
            margin-top: 24px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.8s both;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.2) 50%,
                transparent 100%
            );
            transition: left 0.6s ease;
            z-index: 1;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 16px 48px rgba(0, 102, 255, 0.5),
                0 0 30px rgba(0, 212, 255, 0.2) inset;
        }

        .submit-btn:active {
            transform: translateY(-1px);
            box-shadow: 
                0 8px 24px rgba(0, 102, 255, 0.35),
                0 0 20px rgba(0, 212, 255, 0.1) inset;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            animation: slideInRight 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.7s both;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 212, 255, 0.2),
                transparent
            );
        }

        .divider span {
            padding: 0 16px;
            color: rgba(224, 224, 224, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-link {
            text-align: center;
            color: rgba(224, 224, 224, 0.6);
            font-size: 13px;
            margin-top: 20px;
            animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.9s both;
        }

        .auth-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            position: relative;
        }

        .auth-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #0066ff, #00d4ff);
            transition: width 0.3s ease;
        }

        .auth-link a:hover {
            color: #0066ff;
        }

        .auth-link a:hover::after {
            width: 100%;
        }

        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }

        .otp-input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            color: rgba(224, 224, 224, 0.95);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.6);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message,
        .success-message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            animation: slideInDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .error-message {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid rgba(255, 51, 51, 0.3);
            color: #ff6b6b;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(0, 212, 132, 0.1);
            border: 1px solid rgba(0, 212, 132, 0.3);
            color: #00d084;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .otp-section {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .otp-section.active {
            display: block;
            opacity: 1;
        }

        .form-section.hidden {
            display: none;
        }

        /* =======================================
           RESPONSIVE DESIGN
           ======================================= */

        @media (max-width: 768px) {
            .auth-card {
                padding: 40px 28px;
            }

            .auth-header h1 {
                font-size: 28px;
            }

            .otp-input {
                width: 44px;
                height: 52px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 20px;
                border-radius: 20px;
            }

            .auth-header {
                margin-bottom: 24px;
            }

            .auth-header .logo-icon {
                font-size: 40px;
                margin-bottom: 16px;
            }

            .auth-header h1 {
                font-size: 24px;
            }

            .auth-header p {
                font-size: 13px;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .form-group input {
                padding: 11px 14px;
                font-size: 13px;
            }

            .submit-btn {
                padding: 12px 20px;
                font-size: 14px;
                margin-top: 20px;
            }

            .otp-input {
                width: 40px;
                height: 48px;
                font-size: 16px;
            }

            .otp-input-group {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">DeepShield</span>
            </div>
            <ul class="nav-links">
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html" class="active">Sign Up</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <!-- Header -->
                <div class="auth-header">
                    <span class="logo-icon">🛡️</span>
                    <h1>DeepShield</h1>
                    <p id="headerText">Create Your Account</p>
                </div>

                <!-- Error/Success Messages -->
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <!-- Sign Up Form Section -->
                <div id="formSection">
                    <form id="signupForm" onsubmit="handleSignup(event)">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input 
                                type="text" 
                                id="fullName" 
                                name="fullName" 
                                placeholder="Enter your full name"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="Enter your email"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="phoneNumber">Phone Number</label>
                            <input 
                                type="tel" 
                                id="phoneNumber" 
                                name="phoneNumber" 
                                placeholder="Enter your phone number"
                            >
                        </div>

                        <div class="form-group">
                            <label for="dateOfBirth">Date of Birth</label>
                            <input 
                                type="date" 
                                id="dateOfBirth" 
                                name="dateOfBirth"
                            >
                        </div>

                        <div class="form-group">
                            <label for="country">Country</label>
                            <input 
                                type="text" 
                                id="country" 
                                name="country" 
                                placeholder="Enter your country"
                            >
                        </div>

                        <div class="form-group">
                            <label for="occupation">Occupation</label>
                            <input 
                                type="text" 
                                id="occupation" 
                                name="occupation" 
                                placeholder="Enter your occupation"
                            >
                        </div>

                        <button type="submit" class="submit-btn" id="submitBtn">
                            Send Verification OTP
                        </button>
                    </form>
                </div>

                <!-- OTP Section -->
                <div id="otpSection" class="otp-section">
                    <div class="form-group">
                        <label>Enter OTP (6 digits)</label>
                        <div class="otp-input-group">
                            <input type="text" class="otp-input" maxlength="1" id="otp1" onInput="moveToNext(this, 'otp2')">
                            <input type="text" class="otp-input" maxlength="1" id="otp2" onInput="moveToNext(this, 'otp3')">
                            <input type="text" class="otp-input" maxlength="1" id="otp3" onInput="moveToNext(this, 'otp4')">
                            <input type="text" class="otp-input" maxlength="1" id="otp4" onInput="moveToNext(this, 'otp5')">
                            <input type="text" class="otp-input" maxlength="1" id="otp5" onInput="moveToNext(this, 'otp6')">
                            <input type="text" class="otp-input" maxlength="1" id="otp6" onInput="handleOtpComplete(this)">
                        </div>
                    </div>

                    <button type="button" class="submit-btn" id="verifyBtn" onclick="verifySignupOTP()">
                        Verify & Create Account
                    </button>

                    <div class="otp-timer">
                        <span id="otpTimer">Resend in <span id="timerCount">120</span>s</span>
                        <br>
                        <button type="button" class="resend-btn" id="resendBtn" disabled onclick="resendSignupOTP()">
                            Resend OTP
                        </button>
                    </div>

                    <button type="button" class="resend-btn" onclick="backToForm()" style="display: block; margin-top: 15px;">
                        ← Back
                    </button>
                </div>

                <!-- Divider -->
                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Sign In Link -->
                <div class="auth-link">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let otpTimer = null;
        let timerCount = 120;
        let signupData = {};

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        async function handleSignup(event) {
            event.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const dateOfBirth = document.getElementById('dateOfBirth').value;
            const country = document.getElementById('country').value.trim();
            const occupation = document.getElementById('occupation').value.trim();
            const submitBtn = document.getElementById('submitBtn');

            if (!fullName || !email) {
                showError('Full name and email are required');
                return;
            }

            signupData = { 
                fullName, 
                email, 
                phoneNumber,
                dateOfBirth,
                country,
                occupation
            };
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Sending OTP...';

            try {
                const response = await fetch(getApiUrl('/api/auth/send-otp'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, isSignup: true })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to send OTP');
                }

                showSuccess('OTP sent to your email. Check spam folder if not found.');
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('otpSection').classList.add('active');
                document.getElementById('headerText').textContent = 'Verify Your Email';
                startOtpTimer();
                document.getElementById('otp1').focus();

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Verification OTP';
            }
        }

        function moveToNext(current, nextId) {
            current.value = current.value.replace(/[^0-9]/g, '');
            if (current.value.length === 1) {
                const nextInput = document.getElementById(nextId);
                if (nextInput) nextInput.focus();
            }
        }

        function handleOtpComplete(input) {
            input.value = input.value.replace(/[^0-9]/g, '');
            const otp1 = document.getElementById('otp1').value;
            const otp2 = document.getElementById('otp2').value;
            const otp3 = document.getElementById('otp3').value;
            const otp4 = document.getElementById('otp4').value;
            const otp5 = document.getElementById('otp5').value;
            const otp6 = document.getElementById('otp6').value;

            if (otp1 && otp2 && otp3 && otp4 && otp5 && otp6) {
                verifySignupOTP();
            }
        }

        async function verifySignupOTP() {
            const otp = document.getElementById('otp1').value +
                       document.getElementById('otp2').value +
                       document.getElementById('otp3').value +
                       document.getElementById('otp4').value +
                       document.getElementById('otp5').value +
                       document.getElementById('otp6').value;

            if (otp.length !== 6) {
                showError('Please enter a valid 6-digit OTP');
                return;
            }

            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="loading-spinner"></span> Creating Account...';

            try {
                const response = await fetch(getApiUrl('/api/auth/signup'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        fullName: signupData.fullName,
                        email: signupData.email,
                        phoneNumber: signupData.phoneNumber,
                        dateOfBirth: signupData.dateOfBirth,
                        country: signupData.country,
                        occupation: signupData.occupation,
                        otp
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create account');
                }

                // Store token and redirect
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('userEmail', signupData.email);
                showSuccess('Account created successfully! Redirecting...');
                clearTimeout(otpTimer);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'Verify & Create Account';
            }
        }

        function startOtpTimer() {
            timerCount = 120;
            document.getElementById('resendBtn').disabled = true;

            otpTimer = setInterval(() => {
                timerCount--;
                document.getElementById('timerCount').textContent = timerCount;

                if (timerCount <= 0) {
                    clearInterval(otpTimer);
                    document.getElementById('otpTimer').style.display = 'none';
                    document.getElementById('resendBtn').disabled = false;
                }
            }, 1000);
        }

        async function resendSignupOTP() {
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';

            try {
                const response = await fetch(getApiUrl('/api/auth/send-otp'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: signupData.email,
                        isSignup: true
                    })
                });

                if (!response.ok) throw new Error('Failed to resend OTP');

                showSuccess('OTP resent to your email');
                clearOtpInputs();
                document.getElementById('otpTimer').style.display = 'block';
                startOtpTimer();
                document.getElementById('otp1').focus();

            } catch (error) {
                showError(error.message);
            } finally {
                resendBtn.disabled = true;
                resendBtn.textContent = 'Resend OTP';
            }
        }

        function clearOtpInputs() {
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`otp${i}`).value = '';
            }
        }

        function backToForm() {
            clearOtpInputs();
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('otpSection').classList.remove('active');
            document.getElementById('headerText').textContent = 'Create Your Account';
            document.getElementById('fullName').focus();
            clearTimeout(otpTimer);
        }
    </script>
</body>
</html>
