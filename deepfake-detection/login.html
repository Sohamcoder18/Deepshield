<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DeepShield</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <script src="config.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1a40 100%);
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 30%);
            pointer-events: none;
            animation: bgShift 8s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 520px;
            animation: slideInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideInUp {
            from { 
                opacity: 0; 
                transform: translateY(40px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .auth-card {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 
                0 8px 32px rgba(0, 102, 255, 0.1),
                0 0 60px rgba(0, 212, 255, 0.05) inset;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
        }

        .auth-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 102, 255, 0.2), transparent);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header .logo-icon {
            font-size: 56px;
            display: inline-block;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.4));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .auth-header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff 0%, #0066ff 50%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .auth-header p {
            color: #a0a0a0;
            margin-top: 1rem;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #e0e0e0;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #00d4ff;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(19, 23, 42, 0.5);
            border: 1.5px solid rgba(0, 212, 255, 0.2);
            color: #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .form-group input::placeholder {
            color: #707070;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(19, 23, 42, 0.8);
            box-shadow: 
                0 0 0 4px rgba(0, 212, 255, 0.1),
                0 8px 24px rgba(0, 212, 255, 0.15);
            transform: translateY(-2px);
        }

        .form-group input:hover {
            border-color: rgba(0, 212, 255, 0.4);
            background: rgba(19, 23, 42, 0.7);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #0066ff 0%, #00d4ff 100%);
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 32px rgba(0, 102, 255, 0.3),
                0 0 20px rgba(0, 212, 255, 0.1) inset;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 12px 48px rgba(0, 102, 255, 0.4),
                0 0 30px rgba(0, 212, 255, 0.2) inset;
        }

        .submit-btn:active {
            transform: translateY(-1px);
            box-shadow: 
                0 4px 16px rgba(0, 102, 255, 0.3),
                0 0 15px rgba(0, 212, 255, 0.1) inset;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
        }

        .divider span {
            padding: 0 1.5rem;
            color: #707070;
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-link {
            text-align: center;
            color: #a0a0a0;
            font-size: 14px;
        }

        .auth-link a {
            color: var(--primary-neon);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
        }

        .otp-input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 32px 0;
        }

        .otp-input {
            width: 54px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--text-main);
            transition: var(--transition);
        }

        .otp-input:focus {
            border-color: var(--primary-neon);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-4px);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .auth-card { padding: 32px 24px; }
            .otp-input { width: 44px; height: 50px; font-size: 20px; }
        }
        .otp-section {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .otp-section.active {
            display: block;
            opacity: 1;
        }

        .email-section.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">DeepShield</span>
            </div>
            <ul class="nav-links">
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <!-- Header -->
                <div class="auth-header">
                    <span class="logo-icon">🛡️</span>
                    <h1>DeepShield</h1>
                    <p id="headerText">Sign In to Your Account</p>
                </div>

                <!-- Error/Success Messages -->
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <!-- Email Section -->
                <div id="emailSection">
                    <form id="loginForm" onsubmit="handleEmailSubmit(event)">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="Enter your email"
                                required
                            >
                        </div>

                        <button type="submit" class="submit-btn" id="submitBtn">
                            Send OTP
                        </button>
                    </form>
                </div>

                <!-- OTP Section -->
                <div id="otpSection" class="otp-section">
                    <div class="form-group">
                        <label>Enter OTP (6 digits)</label>
                        <div class="otp-input-group">
                            <input type="text" class="otp-input" maxlength="1" id="otp1" onInput="moveToNext(this, 'otp2')">
                            <input type="text" class="otp-input" maxlength="1" id="otp2" onInput="moveToNext(this, 'otp3')">
                            <input type="text" class="otp-input" maxlength="1" id="otp3" onInput="moveToNext(this, 'otp4')">
                            <input type="text" class="otp-input" maxlength="1" id="otp4" onInput="moveToNext(this, 'otp5')">
                            <input type="text" class="otp-input" maxlength="1" id="otp5" onInput="moveToNext(this, 'otp6')">
                            <input type="text" class="otp-input" maxlength="1" id="otp6" onInput="handleOtpComplete(this)">
                        </div>
                    </div>

                    <button type="button" class="submit-btn" id="verifyBtn" onclick="verifyOTP()">
                        Verify OTP
                    </button>

                    <div class="otp-timer">
                        <span id="otpTimer">Resend in <span id="timerCount">120</span>s</span>
                        <br>
                        <button type="button" class="resend-btn" id="resendBtn" disabled onclick="resendOTP()">
                            Resend OTP
                        </button>
                    </div>

                    <button type="button" class="resend-btn" onclick="backToEmail()" style="display: block; margin-top: 15px;">
                        ← Back
                    </button>
                </div>

                <!-- Divider -->
                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Sign Up Link -->
                <div class="auth-link">
                    Don't have an account? <a href="signup.html">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let otpTimer = null;
        let timerCount = 120;
        let userEmail = '';

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        async function handleEmailSubmit(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');

            if (!email) {
                showError('Please enter your email');
                return;
            }

            userEmail = email;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Sending OTP...';

            try {
                const response = await fetch(getApiUrl('/api/auth/send-otp'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to send OTP');
                }

                showSuccess('OTP sent to your email. Check spam folder if not found.');
                document.getElementById('emailSection').style.display = 'none';
                document.getElementById('otpSection').classList.add('active');
                document.getElementById('headerText').textContent = 'Enter OTP';
                startOtpTimer();
                document.getElementById('otp1').focus();

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send OTP';
            }
        }

        function moveToNext(current, nextId) {
            current.value = current.value.replace(/[^0-9]/g, '');
            if (current.value.length === 1) {
                const nextInput = document.getElementById(nextId);
                if (nextInput) nextInput.focus();
            }
        }

        function handleOtpComplete(input) {
            input.value = input.value.replace(/[^0-9]/g, '');
            const otp1 = document.getElementById('otp1').value;
            const otp2 = document.getElementById('otp2').value;
            const otp3 = document.getElementById('otp3').value;
            const otp4 = document.getElementById('otp4').value;
            const otp5 = document.getElementById('otp5').value;
            const otp6 = document.getElementById('otp6').value;

            if (otp1 && otp2 && otp3 && otp4 && otp5 && otp6) {
                verifyOTP();
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp1').value +
                       document.getElementById('otp2').value +
                       document.getElementById('otp3').value +
                       document.getElementById('otp4').value +
                       document.getElementById('otp5').value +
                       document.getElementById('otp6').value;

            if (otp.length !== 6) {
                showError('Please enter a valid 6-digit OTP');
                return;
            }

            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="loading-spinner"></span> Verifying...';

            try {
                const response = await fetch(getApiUrl('/api/auth/verify-otp'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: userEmail, otp })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Invalid OTP');
                }

                // Store token and redirect
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('userEmail', userEmail);
                showSuccess('Login successful! Redirecting...');
                clearTimeout(otpTimer);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'Verify OTP';
            }
        }

        function startOtpTimer() {
            timerCount = 120;
            document.getElementById('resendBtn').disabled = true;

            otpTimer = setInterval(() => {
                timerCount--;
                document.getElementById('timerCount').textContent = timerCount;

                if (timerCount <= 0) {
                    clearInterval(otpTimer);
                    document.getElementById('otpTimer').style.display = 'none';
                    document.getElementById('resendBtn').disabled = false;
                }
            }, 1000);
        }

        async function resendOTP() {
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';

            try {
                const response = await fetch(getApiUrl('/api/auth/send-otp'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: userEmail })
                });

                if (!response.ok) throw new Error('Failed to resend OTP');

                showSuccess('OTP resent to your email');
                clearOtpInputs();
                document.getElementById('otpTimer').style.display = 'block';
                startOtpTimer();
                document.getElementById('otp1').focus();

            } catch (error) {
                showError(error.message);
            } finally {
                resendBtn.disabled = true;
                resendBtn.textContent = 'Resend OTP';
            }
        }

        function clearOtpInputs() {
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`otp${i}`).value = '';
            }
        }

        function backToEmail() {
            clearOtpInputs();
            document.getElementById('emailSection').style.display = 'block';
            document.getElementById('otpSection').classList.remove('active');
            document.getElementById('headerText').textContent = 'Sign In to Your Account';
            document.getElementById('email').focus();
            clearTimeout(otpTimer);
        }
    </script>
</body>
</html>
